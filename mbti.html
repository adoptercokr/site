<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성격 분석 - 인생의 지혜</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .q-text { font-size: 22px; font-weight: 700; margin-bottom: 30px; text-align: center; word-break: keep-all; line-height: 1.5; }
        .ans-btn { 
            background: #fff; border: 3px solid var(--border); width: 100%; 
            padding: 18px; border-radius: 18px; font-size: 19px; cursor: pointer; 
            margin-bottom: 15px; transition: 0.2s; text-align: center; font-family: inherit; font-weight: 600;
        }
        .ans-btn:hover, .ans-btn:active { border-color: var(--primary); background: #FEF7F0; transform: scale(0.98); }
        .res-mbti { background: var(--primary); color: #fff; display: inline-block; padding: 6px 20px; border-radius: 12px; font-size: 32px; font-weight: 900; margin-bottom: 10px; letter-spacing: 2px;}
        .res-subtype { font-size: 24px; color: var(--primary-dark); font-weight: 800; margin: 15px 0; }
        .res-desc { text-align: left; font-size: 18px; background: #fff; padding: 25px; border-radius: 16px; margin: 20px 0; border: 1px solid var(--border); line-height: 1.8; color: #444; }
        .bar-wrap { width: 100%; height: 16px; background: #eee; border-radius: 8px; margin: 8px 0 25px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); width: 0%; transition: 1.5s ease-out; }
        
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        
        #loading-view { display:none; text-align: center; padding: 60px 0; }
        .pulse { font-size: 60px; animation: pulse 1s infinite; margin-bottom: 20px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="top-nav">
        <a href="index.html" class="home-btn">🏠</a>
        <h2 style="font-size: 24px;">초정밀 성격 분석</h2>
        <div style="width:50px;"></div>
    </header>

    <div class="ad-box">📢 상단 메인 광고 배너</div>

    <main class="content-padding">
        <div id="start-view" class="card animate-in" style="text-align: center;">
            <div style="font-size: 60px; margin-bottom: 15px;">🧬</div>
            <h1 style="font-size: 26px; color: var(--primary-dark); margin-bottom: 15px;">진짜 내 모습 찾기</h1>
            <p style="font-size: 18px; color: var(--text-sub); margin-bottom: 30px; line-height: 1.6;">
                심리학 기반의 20가지 핵심 질문으로<br>당신의 숨겨진 잠재력과 성향을<br>초정밀 분석해 드립니다.
            </p>
            <button class="btn-main" onclick="startQuiz()">정밀 분석 시작하기</button>
        </div>

        <div id="quiz-view" style="display:none">
            <div class="card animate-in">
                <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
                <div id="q-num" style="color: var(--primary); font-weight: bold; margin-bottom: 10px; text-align: center; font-size: 16px;"></div>
                <div id="q-text" class="q-text"></div>
                <div id="ans-wrap"></div>
                <button class="btn-sub" onclick="goBack()" id="back-btn" style="display:none; margin-top:20px;">이전 질문으로</button>
            </div>
        </div>

        <div id="loading-view">
            <div class="pulse">🧠</div>
            <h3 style="font-size: 22px; color: var(--primary-dark); margin-bottom: 10px;">두뇌 인지 패턴 분석 중...</h3>
            <p style="color: var(--text-sub);">수만 건의 성격 데이터를 대조하고 있습니다.</p>
        </div>

        <div id="result-view" style="display:none">
            <div class="card animate-in" style="text-align: center;">
                <div class="res-mbti" id="res-mbti"></div>
                <div class="res-subtype" id="res-subtype"></div>
                
                <div class="res-desc" id="res-desc"></div>
                
                <h4 style="text-align: left; font-size: 18px; margin-bottom: 15px; color: var(--primary-dark);">📊 나의 성향 분석 지표</h4>
                <div style="text-align: left;">
                    <label>외향성 (에너지 방향)</label><div class="bar-wrap"><div class="bar-fill" id="bar-e"></div></div>
                    <label>직관력 (정보 수집)</label><div class="bar-wrap"><div class="bar-fill" id="bar-n"></div></div>
                    <label>논리성 (판단 기준)</label><div class="bar-wrap"><div class="bar-fill" id="bar-t"></div></div>
                    <label>계획성 (생활 양식)</label><div class="bar-wrap"><div class="bar-fill" id="bar-j"></div></div>
                </div>
                
                <button class="btn-main" style="margin-top: 30px;" onclick="location.reload()">다시 분석하기</button>
            </div>
        </div>
    </main>

    <div class="ad-fixed-bottom">
        <div class="ad-box" style="margin:0">📢 하단 고정 광고 배너</div>
    </div>
</div>

<script>
const questions = [
    // EI
    { q: "새로운 사람들과 모임에 가면 에너지를 얻고 기분이 좋아진다.", type: "EI", weight: 1 },
    { q: "휴일에는 밖에 나가는 것보다 집에서 혼자만의 시간을 보내는 것이 좋다.", type: "EI", weight: -1 },
    { q: "말을 하기 전에 머릿속으로 충분히 생각을 정리해야 편안하다.", type: "EI", weight: -1 },
    { q: "여러 사람 앞에서 내 의견을 발표하거나 앞장서는 것이 크게 두렵지 않다.", type: "EI", weight: 1 },
    { q: "친구들과 만난 후에는 혼자서 에너지를 충전할 시간이 반드시 필요하다.", type: "EI", weight: -1 },
    // SN
    { q: "미래의 가능성이나 추상적인 아이디어보다는 현실적이고 실용적인 것에 관심이 많다.", type: "SN", weight: -1 },
    { q: "어떤 일을 할 때, 정해진 매뉴얼이나 과거의 경험에 의존하는 편이다.", type: "SN", weight: -1 },
    { q: "멍하니 상상에 빠지거나 '만약에~'라는 질문을 스스로 자주 던진다.", type: "SN", weight: 1 },
    { q: "비유적이거나 은유적인 표현보다는 사실 그대로의 직설적인 표현이 좋다.", type: "SN", weight: -1 },
    { q: "기존의 방식을 따르기보다는 나만의 새롭고 독창적인 방식을 만들어내는 것이 즐겁다.", type: "SN", weight: 1 },
    // TF
    { q: "결정을 내릴 때, 다른 사람의 감정보다 객관적인 사실과 논리가 더 중요하다.", type: "TF", weight: 1 },
    { q: "친구가 슬퍼할 때, 원인을 분석해주기보다는 먼저 안아주고 공감해주는 편이다.", type: "TF", weight: -1 },
    { q: "공정하고 원칙대로 일을 처리하는 것이 모든 사람을 만족시키는 것보다 낫다고 생각한다.", type: "TF", weight: 1 },
    { q: "대화 중 상대방이 상처받을까 봐 내 의견을 강하게 주장하지 못할 때가 많다.", type: "TF", weight: -1 },
    { q: "나에 대한 비판적인 피드백을 들어도 기분 나빠하기보다 배울 점을 찾으려 한다.", type: "TF", weight: 1 },
    // JP
    { q: "여행을 갈 때 세부적인 계획(시간, 장소, 예산)을 철저하게 세워야 마음이 놓인다.", type: "JP", weight: 1 },
    { q: "물건을 사용한 후에는 항상 원래 있던 자리에 똑같이 정리해둔다.", type: "JP", weight: 1 },
    { q: "마감 기한이 다가올 때까지 일을 미루다가 마지막에 폭발적인 집중력으로 끝내는 편이다.", type: "JP", weight: -1 },
    { q: "갑작스럽게 계획이 변경되어도 스트레스를 받지 않고 유연하게 대처한다.", type: "JP", weight: -1 },
    { q: "그날의 기분에 따라 즉흥적으로 약속을 잡거나 일을 처리하는 것을 좋아한다.", type: "JP", weight: -1 }
];

const subData = {
    "ISTJ": {
        title: "신중하고 책임감 강한 소금형",
        desc: "당신은 한 번 맡은 일은 끝까지 완수하는 책임감의 끝판왕입니다. 규칙을 존중하고 기억력이 뛰어나며, 실용적인 판단력으로 조직에서 든든한 기둥 역할을 합니다. 보수적인 면이 있으나 깊은 진국 같은 매력이 있습니다."
    },
    "ISFJ": {
        title: "따뜻하고 헌신적인 수호자형",
        desc: "타인의 감정을 세심하게 살피고 배려하는 따뜻한 마음의 소유자입니다. 성실하고 꼼꼼하며, 뒤에서 묵묵히 사람들을 돕는 것을 좋아합니다. 가족과 지인에게 없어서는 안 될 소중한 존재입니다."
    },
    "INFJ": {
        title: "통찰력 있는 신비로운 예언자",
        desc: "뛰어난 직관력과 깊은 공감 능력을 동시에 지닌 희귀한 유형입니다. 사람의 본심을 꿰뚫어 보며, 강한 신념을 바탕으로 세상을 더 나은 곳으로 만들고자 하는 이상주의자입니다."
    },
    "INTJ": {
        title: "치밀하고 독립적인 전략가",
        desc: "전체적인 숲을 보는 안목과 분석력을 지녔습니다. 독립심이 강하고 자신만의 명확한 비전이 있으며, 목표를 달성하기 위해 완벽한 계획을 설계하고 실행해 나가는 뛰어난 지략가입니다."
    },
    "ISTP": {
        title: "논리적이고 뛰어난 장인",
        desc: "상황 적응력이 뛰어나고 효율성을 중시합니다. 말보다는 행동으로 보여주며, 복잡한 문제도 특유의 손재주와 논리로 척척 해결해내는 쿨한 매력의 소유자입니다."
    },
    "ISFP": {
        title: "따뜻한 감성의 자유로운 예술가",
        desc: "마음이 따뜻하고 동정심이 많으며, 현재의 순간을 즐길 줄 아는 유연한 성격입니다. 갈등을 싫어하며 자연과 예술의 아름다움을 사랑하는 부드럽고 친절한 영혼입니다."
    },
    "INFP": {
        title: "이상적이고 낭만적인 중재자",
        desc: "내면의 가치와 신념을 가장 중요하게 생각합니다. 호기심이 많고 상상력이 풍부하며, 타인에 대한 이해심이 깊어 사람들의 마음을 치유해주는 힐러 같은 역할을 합니다."
    },
    "INTP": {
        title: "비판적이고 호기심 많은 사색가",
        desc: "지적 호기심이 왕성하고 새로운 아이디어에 열광합니다. 논리와 분석을 즐기며, 일상적인 대화보다는 우주나 철학 같은 깊이 있는 주제를 탐구하는 것을 좋아하는 조용한 천재입니다."
    },
    "ESTP": {
        title: "스릴을 즐기는 현실적인 모험가",
        desc: "오감이 발달하고 관찰력이 뛰어나며, 에너지 넘치는 삶을 즐깁니다. 어떤 위기 상황에서도 당황하지 않고 타협점을 찾아내는 뛰어난 협상가이자 문제 해결사입니다."
    },
    "ESFP": {
        title: "사교적이고 에너지 넘치는 연예인",
        desc: "어디서나 분위기 메이커 역할을 톡톡히 해냅니다. 사람들과 어울리는 것을 진심으로 즐기며, 타고난 낙천성과 긍정 에너지로 주변 사람들에게 항상 웃음을 선사합니다."
    },
    "ENFP": {
        title: "열정적이고 창의적인 활동가",
        desc: "새로운 프로젝트나 사람을 만나는 것에 항상 가슴이 뜁니다. 넘치는 상상력과 특유의 친화력으로 누구와도 금세 친구가 되며, 인생의 다양한 가능성을 열어두고 탐험하는 것을 좋아합니다."
    },
    "ENTP": {
        title: "다재다능하고 발명가적인 혁신가",
        desc: "두뇌 회전이 빠르고 논쟁을 즐기며, 늘 새로운 아이디어가 샘솟습니다. 기존의 틀을 깨는 것에 두려움이 없으며, 넓은 안목으로 다방면에서 재능을 발휘하는 매력적인 도전자입니다."
    },
    "ESTJ": {
        title: "현실적이고 철저한 타고난 리더",
        desc: "목표가 정해지면 강력한 추진력으로 밀어붙이는 사업가 타입입니다. 규칙과 질서를 중시하며, 효율적으로 조직을 이끌고 결단력 있게 행동하여 많은 사람들의 신뢰를 받습니다."
    },
    "ESFJ": {
        title: "친절하고 사교적인 외교관",
        desc: "사람들에 대한 관심이 많고 모임에서 조화와 협력을 이끌어냅니다. 타고난 다정함과 책임감으로 타인에게 봉사하는 것에 큰 기쁨을 느끼는 따뜻한 마음씨의 소유자입니다."
    },
    "ENFJ": {
        title: "타인을 성장시키는 카리스마 리더",
        desc: "탁월한 언변과 공감 능력으로 사람들의 마음을 움직입니다. 타인의 잠재력을 이끌어내는 데 천부적인 재능이 있으며, 세상을 더 따뜻하게 만들고자 하는 선한 영향력의 주인공입니다."
    },
    "ENTJ": {
        title: "대담하고 통솔력 있는 지휘관",
        desc: "원대한 비전과 확고한 신념으로 조직을 이끄는 장군 같은 타입입니다. 효율적인 시스템 구축에 탁월하며, 험난한 도전 앞에서도 굴하지 않고 목표를 성취해내는 타고난 지도자입니다."
    }
};

let currentIdx = 0;
let results = { EI: 0, SN: 0, TF: 0, JP: 0 };
let history = [];

function startQuiz() {
    document.getElementById('start-view').style.display = 'none';
    document.getElementById('quiz-view').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    if (currentIdx >= questions.length) {
        showLoading();
        return;
    }
    const q = questions[currentIdx];
    
    // Update progress bar
    const pct = (currentIdx / questions.length) * 100;
    document.getElementById('p-bar').style.width = pct + '%';
    
    document.getElementById('q-num').innerText = `질문 ${currentIdx + 1} / ${questions.length}`;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('back-btn').style.display = currentIdx > 0 ? 'block' : 'none';
    
    const wrap = document.getElementById('ans-wrap');
    wrap.innerHTML = "";
    
    const options = [
        { t: "매우 그렇다", v: 2 },
        { t: "약간 그렇다", v: 1 },
        { t: "별로 아니다", v: -1 },
        { t: "전혀 아니다", v: -2 }
    ];

    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "ans-btn";
        btn.innerText = opt.t;
        btn.onclick = () => {
            const score = (opt.v * q.weight);
            results[q.type] += score;
            history.push({ type: q.type, score: score });
            currentIdx++;
            renderQuestion();
        };
        wrap.appendChild(btn);
    });
}

function goBack() {
    if(history.length === 0) return;
    const lastAction = history.pop();
    results[lastAction.type] -= lastAction.score;
    currentIdx--;
    renderQuestion();
}

function showLoading() {
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('loading-view').style.display = 'block';
    setTimeout(calculateResult, 3000);
}

function calculateResult() {
    let mbti = "";
    mbti += results.EI > 0 ? "E" : "I";
    mbti += results.SN > 0 ? "N" : "S";
    mbti += results.TF > 0 ? "T" : "F";
    mbti += results.JP > 0 ? "J" : "P";

    const typeInfo = subData[mbti] || { title: "분석 중", desc: "분석을 완료하지 못했습니다." };

    document.getElementById('loading-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'block';
    
    document.getElementById('res-mbti').innerText = mbti;
    document.getElementById('res-subtype').innerText = typeInfo.title;
    document.getElementById('res-desc').innerHTML = `<strong>${mbti} 유형의 특징:</strong><br><br>${typeInfo.desc}`;

    // Calculate percentage for bars (-10 to 10 range based on 5 questions * 2 max score)
    const setBar = (id, val) => {
        // Map -10 ~ 10 to 10% ~ 90%
        let p = ((val + 10) / 20) * 100;
        p = Math.min(Math.max(p, 10), 90);
        setTimeout(() => {
            document.getElementById(id).style.width = p + "%";
        }, 300);
    };
    
    setBar('bar-e', results.EI);
    setBar('bar-n', results.SN);
    setBar('bar-t', results.TF);
    setBar('bar-j', results.JP);
    
    window.scrollTo(0, 0);
}
</script>
</body>
</html>
