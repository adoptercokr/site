<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인연 궁합 - 인생의 지혜</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .match-box { display: flex; align-items: center; justify-content: space-between; background: #FFF0E8; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .person { flex: 1; text-align: center; }
        .heart { font-size: 40px; animation: beat 1s infinite; margin: 0 15px; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; margin: 20px auto; border: 8px solid #FFE0B2; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .res-desc { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--border); font-size: 18px; line-height: 1.6; color: #444; margin-bottom: 20px;}
        
        #loading-view { display: none; text-align: center; padding: 40px 0; }
        .spinner { font-size: 50px; animation: spin 2s linear infinite; display: inline-block;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="top-nav">
        <a href="index.html" class="home-btn">🏠</a>
        <h2 style="font-size: 24px;">천생연분 궁합 보기</h2>
        <div style="width:50px;"></div>
    </header>

    <div class="ad-box">📢 상단 메인 광고 배너</div>

    <main class="content-padding">
        <div id="input-view" class="card animate-in">
            <h3 style="font-size: 22px; color: var(--primary-dark); margin-bottom: 20px; text-align: center;">💕 두 분의 생년월일을 입력하세요</h3>
            
            <div style="background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border:1px solid #eee;">
                <label style="color:#e74c3c;">본인 정보</label>
                <input type="text" id="n1" placeholder="본인 성함">
                <input type="number" id="b1" placeholder="생년월일 8자리 (예: 19600101)">
            </div>
            
            <div style="background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border:1px solid #eee;">
                <label style="color:#3498db;">상대방 정보</label>
                <input type="text" id="n2" placeholder="상대방 성함">
                <input type="number" id="b2" placeholder="생년월일 8자리 (예: 19630505)">
            </div>
            
            <button class="btn-main" onclick="calcMatch()">궁합 분석하기</button>
        </div>

        <div id="loading-view" class="card">
            <div class="spinner">💞</div>
            <h4 style="font-size: 20px; color: var(--primary-dark); margin-top: 15px;">음양오행의 조화를 계산 중입니다...</h4>
        </div>

        <div id="result-view" class="card animate-in" style="display:none; text-align: center;">
            <div class="match-box">
                <div class="person"><strong id="rn1" style="font-size:20px;"></strong>님</div>
                <div class="heart">❤️</div>
                <div class="person"><strong id="rn2" style="font-size:20px;"></strong>님</div>
            </div>
            
            <h3 style="font-size: 20px; color: #555;">두 분의 찰떡 궁합 지수</h3>
            <div class="score-circle" id="score"></div>
            
            <div class="res-desc" id="desc"></div>
            
            <button class="btn-main" style="margin-top: 10px;" onclick="location.reload()">다시 분석하기</button>
        </div>
    </main>

    <div class="ad-fixed-bottom">
        <div class="ad-box" style="margin:0">📢 하단 고정 광고 배너</div>
    </div>
</div>

<script>
const texts = [
    "두 분은 전생에서부터 이어진 깊은 인연입니다. 서로 부족한 오행을 완벽하게 채워주며, 함께 있을 때 재물운과 건강운이 동반 상승하는 천생연분입니다.",
    "서로 다름을 인정하고 배려할 때 최고의 시너지가 나는 관계입니다. 처음에는 의견 충돌이 있을 수 있으나, 시간이 갈수록 뿌리 깊은 나무처럼 단단해집니다.",
    "따뜻한 불과 든든한 흙의 만남처럼 서로를 따뜻하게 품어주는 좋은 궁합입니다. 대화가 잘 통하고 취미 생활을 공유하면 말년에 더욱 큰 행복을 누립니다.",
    "서로에게 좋은 자극제가 되는 인연입니다. 가끔은 적당한 거리를 유지하며 각자의 생활을 존중해 줄 때 관계의 만족도가 훨씬 더 높아집니다."
];

function calcMatch() {
    const n1 = document.getElementById('n1').value;
    const b1 = document.getElementById('b1').value;
    const n2 = document.getElementById('n2').value;
    const b2 = document.getElementById('b2').value;
    
    if(!n1 || b1.length !== 8 || !n2 || b2.length !== 8) {
        alert("이름과 생년월일 8자리를 모두 정확히 입력해 주세요.");
        return;
    }
    
    document.getElementById('input-view').style.display = 'none';
    document.getElementById('loading-view').style.display = 'block';
    
    setTimeout(() => {
        // Pseudo-random based on inputs
        let sum = parseInt(b1) + parseInt(b2);
        for(let i=0; i<n1.length; i++) sum += n1.charCodeAt(i);
        for(let i=0; i<n2.length; i++) sum += n2.charCodeAt(i);
        
        let score = 70 + (sum % 31); // 70 to 100
        let txtIdx = sum % texts.length;
        
        document.getElementById('rn1').innerText = n1;
        document.getElementById('rn2').innerText = n2;
        document.getElementById('score').innerText = score + "점";
        document.getElementById('desc').innerText = texts[txtIdx];
        
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
    }, 2500);
}
</script>
</body>
</html>
