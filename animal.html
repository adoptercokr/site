<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 관상 - 인생의 지혜</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .upload-box { border: 3px dashed var(--primary); border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; background: #FFF0E8; transition: 0.3s; margin-bottom: 20px;}
        .upload-box:hover { background: #FFE0B2; }
        .upload-icon { font-size: 50px; margin-bottom: 15px; }
        .upload-text { font-size: 18px; font-weight: bold; color: var(--primary-dark); }
        
        #preview-img { max-width: 100%; max-height: 250px; border-radius: 12px; margin: 20px auto; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .scan-line { width: 100%; height: 4px; background: #00B894; position: absolute; top: 0; left: 0; box-shadow: 0 0 10px #00B894; animation: scan 2s infinite linear; display: none;}
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        
        .res-animal { font-size: 80px; margin-bottom: 10px; }
        .res-title { font-size: 26px; font-weight: 900; color: var(--primary-dark); margin-bottom: 15px; }
        .res-desc { font-size: 18px; line-height: 1.6; color: #444; background: #f9f9f9; padding: 20px; border-radius: 12px; text-align: left;}
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="top-nav">
        <a href="index.html" class="home-btn">🏠</a>
        <h2 style="font-size: 24px;">AI 동물상 관상</h2>
        <div style="width:50px;"></div>
    </header>

    <div class="ad-box">📢 상단 메인 광고 배너</div>

    <main class="content-padding">
        <div id="upload-view" class="card animate-in">
            <h3 style="font-size: 22px; text-align: center; margin-bottom: 15px;">나와 닮은 동물은 무엇일까?</h3>
            <p style="text-align: center; color: var(--text-sub); margin-bottom: 20px;">얼굴 사진을 올리면 AI가 관상을 분석하여<br>가장 닮은 동물상과 재물운을 알려드립니다.</p>
            
            <div class="upload-box" onclick="document.getElementById('file-input').click();">
                <div class="upload-icon">📸</div>
                <div class="upload-text">여기를 눌러 사진 선택하기</div>
                <div style="font-size:14px; color:#666; margin-top:10px;">(사진은 서버에 저장되지 않아 안전합니다)</div>
            </div>
            <input type="file" id="file-input" accept="image/*" onchange="loadFile(event)">
            
            <div style="position: relative; text-align:center;">
                <img id="preview-img">
                <div class="scan-line" id="scan-line"></div>
            </div>
            
            <button class="btn-main" id="analyze-btn" style="display:none;" onclick="startAnalyze()">AI 관상 분석 시작</button>
        </div>

        <div id="result-view" class="card animate-in" style="display:none; text-align: center;">
            <div class="res-animal" id="res-emoji"></div>
            <div class="res-title" id="res-title"></div>
            <div class="res-desc" id="res-desc"></div>
            <button class="btn-main" style="margin-top: 25px;" onclick="location.reload()">다른 사진으로 해보기</button>
        </div>
    </main>

    <div class="ad-fixed-bottom">
        <div class="ad-box" style="margin:0">📢 하단 고정 광고 배너</div>
    </div>
</div>

<script>
const animals = [
    { e: "🐶", t: "친근하고 충직한 강아지상", d: "당신은 사람들에게 호감을 주는 부드러운 인상을 가졌습니다. 인복이 많아 주변에 항상 돕는 귀인이 끊이지 않으며, 초년보다 중년 이후에 재물이 크게 모이는 관상입니다." },
    { e: "🐱", t: "매력적이고 도도한 고양이상", d: "눈치가 빠르고 두뇌 회전이 비상합니다. 남들에게 기대기보다 스스로 독립적인 성취를 이뤄내는 타입이며, 특유의 예리한 감각으로 투자나 사업에서 큰 성공을 거둘 관상입니다." },
    { e: "🐯", t: "카리스마 넘치는 호랑이상", d: "강한 리더십과 묵직한 존재감을 지녔습니다. 불의를 참지 못하는 대장부 기질이 있으며, 조직의 우두머리가 되거나 큰 사업체를 이끌어갈 강력한 재물운을 타고났습니다." },
    { e: "🐻", t: "듬직하고 포용력 넓은 곰상", d: "태산처럼 묵직하고 믿음직스러워 주변 사람들이 당신을 깊이 의지합니다. 끈기와 인내심이 최고 수준이며, 부동산이나 안정적인 투자로 거대한 자산을 축적할 관상입니다." },
    { e: "🐰", t: "재치있고 사랑스러운 토끼상", d: "발랄하고 센스가 넘치며 어떤 환경에서도 유연하게 적응합니다. 뛰어난 예술적 감각이나 말솜씨를 살려 대중의 사랑을 받으며 부를 축적하는 매력적인 상입니다." }
];

function loadFile(event) {
    const reader = new FileReader();
    reader.onload = function(){
        const img = document.getElementById('preview-img');
        img.src = reader.result;
        img.style.display = 'inline-block';
        document.getElementById('analyze-btn').style.display = 'block';
    };
    reader.readAsDataURL(event.target.files[0]);
}

function startAnalyze() {
    document.getElementById('analyze-btn').style.display = 'none';
    document.getElementById('scan-line').style.display = 'block';
    
    setTimeout(() => {
        const result = animals[Math.floor(Math.random() * animals.length)];
        
        document.getElementById('upload-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        
        document.getElementById('res-emoji').innerText = result.e;
        document.getElementById('res-title').innerText = result.t;
        document.getElementById('res-desc').innerHTML = `<strong>[관상 및 재물운 분석]</strong><br><br>${result.d}`;
        window.scrollTo(0, 0);
    }, 3000);
}
</script>
</body>
</html>
