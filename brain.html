<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>두뇌 건강 - 인생의 지혜</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .game-menu { display: flex; flex-direction: column; gap: 15px; }
        .game-btn { background: #fff; border: 2px solid var(--primary); padding: 20px; border-radius: 16px; font-size: 20px; font-weight: bold; color: var(--primary-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .game-btn:active { transform: scale(0.98); background: #FEF7F0; }
        
        /* Game UI */
        #game-area { display: none; text-align: center; }
        .g-header { font-size: 22px; font-weight: bold; color: var(--primary-dark); margin-bottom: 20px; }
        .g-level { font-size: 16px; color: #666; margin-bottom: 15px; }
        .g-display { font-size: 50px; font-weight: 900; letter-spacing: 5px; color: #333; margin: 30px 0; height: 70px; display: flex; align-items: center; justify-content: center; }
        
        .n-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; }
        .n-btn { background: #eee; border: none; border-radius: 12px; font-size: 24px; font-weight: bold; padding: 20px 0; cursor: pointer; color: #333; }
        .n-btn:active { background: #ddd; }
        
        .ans-input { width: 100%; max-width: 250px; font-size: 30px; text-align: center; padding: 10px; border: 2px solid var(--primary); border-radius: 12px; margin-bottom: 20px; font-weight: bold;}
        
        .color-btns { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .c-btn { width: 100px; padding: 20px 0; font-size: 20px; font-weight: bold; color: #fff; border: none; border-radius: 12px; cursor: pointer; }
        .c-red { background: #e74c3c; } .c-blue { background: #3498db; }
        
        .result-box { background: #FFF0E8; padding: 20px; border-radius: 16px; margin-top: 20px; font-size: 18px; line-height: 1.6; display: none;}
    </style>
</head>
<body>

<div class="app-container">
    <header class="top-nav">
        <a href="index.html" class="home-btn">🏠</a>
        <h2 style="font-size: 24px;">치매 예방 두뇌 훈련</h2>
        <div style="width:50px;"></div>
    </header>

    <div class="ad-box">📢 상단 메인 광고 배너</div>

    <main class="content-padding">
        <div id="menu-view" class="card animate-in">
            <h3 style="font-size: 22px; margin-bottom: 20px; text-align: center; color: var(--primary-dark);">매일 5분! 젊어지는 뇌</h3>
            <div class="game-menu">
                <button class="game-btn" onclick="startMemoryGame()">🔢 숫자 기억력 게임</button>
                <button class="game-btn" onclick="startCalcGame()">➕ 순발력 계산 게임</button>
                <button class="game-btn" onclick="startColorGame()">🔴 색상 인지 게임</button>
            </div>
        </div>

        <div id="game-area" class="card animate-in">
            <div class="g-header" id="g-title">게임</div>
            <div class="g-level" id="g-level">1단계</div>
            
            <div class="g-display" id="g-display">준비...</div>
            
            <!-- Memory Input -->
            <div id="memory-input" style="display:none;">
                <input type="number" id="m-ans" class="ans-input" placeholder="숫자 입력" disabled>
                <div class="n-pad">
                    <button class="n-btn" onclick="addNum(1)">1</button><button class="n-btn" onclick="addNum(2)">2</button><button class="n-btn" onclick="addNum(3)">3</button>
                    <button class="n-btn" onclick="addNum(4)">4</button><button class="n-btn" onclick="addNum(5)">5</button><button class="n-btn" onclick="addNum(6)">6</button>
                    <button class="n-btn" onclick="addNum(7)">7</button><button class="n-btn" onclick="addNum(8)">8</button><button class="n-btn" onclick="addNum(9)">9</button>
                    <button class="n-btn" onclick="delNum()">지움</button><button class="n-btn" onclick="addNum(0)">0</button><button class="n-btn" style="background:var(--primary); color:#fff;" onclick="checkMemory()">확인</button>
                </div>
            </div>

            <!-- Calc Input -->
            <div id="calc-input" style="display:none;">
                <input type="number" id="c-ans" class="ans-input" placeholder="정답 입력">
                <button class="btn-main" onclick="checkCalc()">정답 확인</button>
            </div>

            <!-- Color Input -->
            <div id="color-input" class="color-btns" style="display:none;">
                <button class="c-btn c-red" onclick="checkColor('red')">빨강색</button>
                <button class="c-btn c-blue" onclick="checkColor('blue')">파랑색</button>
            </div>

            <div class="result-box" id="result-box"></div>
            <button class="btn-sub" style="margin-top:20px;" onclick="location.reload()">메인 메뉴로 돌아가기</button>
        </div>
    </main>
</div>

<script>
let currentMode = '';
let level = 1;
let score = 0;
let targetValue = '';

// --- Memory Game ---
function startMemoryGame() {
    currentMode = 'memory'; level = 1; score = 0;
    document.getElementById('menu-view').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('g-title').innerText = "숫자 기억력 게임";
    playMemoryLevel();
}

function playMemoryLevel() {
    document.getElementById('m-ans').value = '';
    document.getElementById('memory-input').style.display = 'none';
    document.getElementById('g-level').innerText = level + "단계";
    
    // Generate random number (starts with 3 digits, increases)
    let len = 2 + level;
    let num = "";
    for(let i=0; i<len; i++) num += Math.floor(Math.random() * 10);
    targetValue = num;
    
    document.getElementById('g-display').innerText = num;
    
    setTimeout(() => {
        document.getElementById('g-display').innerText = "???";
        document.getElementById('memory-input').style.display = 'block';
    }, 2000 + (level * 500)); // Show a bit longer as level increases
}

function addNum(n) { document.getElementById('m-ans').value += n; }
function delNum() { 
    let v = document.getElementById('m-ans').value;
    document.getElementById('m-ans').value = v.substring(0, v.length - 1);
}

function checkMemory() {
    const ans = document.getElementById('m-ans').value;
    if(ans === targetValue) {
        level++;
        if(level > 5) { endGame("축하합니다! 5단계를 모두 통과하셨습니다.<br>당신의 기억력은 상위 5%입니다!"); }
        else { playMemoryLevel(); }
    } else {
        endGame(`아쉽습니다. 정답은 <strong>${targetValue}</strong> 였습니다.<br>최종 도달: ${level}단계`);
    }
}

// --- Calc Game ---
function startCalcGame() {
    currentMode = 'calc'; level = 1; score = 0;
    document.getElementById('menu-view').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('g-title').innerText = "순발력 계산 게임";
    document.getElementById('calc-input').style.display = 'block';
    playCalcLevel();
}

function playCalcLevel() {
    document.getElementById('c-ans').value = '';
    document.getElementById('g-level').innerText = level + "단계";
    
    let a, b, op;
    if(level <= 2) { a = r(1,20); b = r(1,20); op = '+'; targetValue = a+b; }
    else if(level <= 4) { a = r(10,50); b = r(1,20); op = '-'; targetValue = a-b; }
    else { a = r(2,9); b = r(2,9); op = '×'; targetValue = a*b; }
    
    document.getElementById('g-display').innerText = `${a} ${op} ${b} = ?`;
}

function checkCalc() {
    const ans = parseInt(document.getElementById('c-ans').value);
    if(ans === targetValue) {
        level++;
        if(level > 6) { endGame("완벽합니다! 치매 예방에 탁월한 계산 능력입니다!"); }
        else { playCalcLevel(); }
    } else {
        endGame(`틀렸습니다. 정답은 <strong>${targetValue}</strong> 였습니다.<br>계산 연습을 매일 해주세요!`);
    }
}

// --- Color Game (Stroop) ---
const colors = [
    { t: "빨강", c: "red", hex: "#e74c3c" },
    { t: "파랑", c: "blue", hex: "#3498db" }
];

function startColorGame() {
    currentMode = 'color'; level = 1; score = 0;
    document.getElementById('menu-view').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('g-title').innerText = "글자 색상 인지 게임";
    document.getElementById('g-level').innerText = "글자의 '의미'가 아닌 '색상'을 누르세요!";
    document.getElementById('color-input').style.display = 'flex';
    playColorLevel();
}

function playColorLevel() {
    let tIdx = r(0,1);
    let cIdx = r(0,1);
    targetValue = colors[cIdx].c; // The actual color shown
    
    let el = document.getElementById('g-display');
    el.innerText = colors[tIdx].t;
    el.style.color = colors[cIdx].hex;
}

function checkColor(colorVal) {
    if(colorVal === targetValue) {
        level++;
        if(level > 10) { endGame("대단합니다! 인지 능력이 매우 훌륭합니다!"); }
        else { playColorLevel(); }
    } else {
        endGame(`아차! 글자 색상을 선택하셔야 합니다.<br>도달 단계: ${level}단계`);
    }
}

// --- Utils ---
function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function endGame(msg) {
    document.getElementById('g-display').style.display = 'none';
    document.getElementById('memory-input').style.display = 'none';
    document.getElementById('calc-input').style.display = 'none';
    document.getElementById('color-input').style.display = 'none';
    
    const rb = document.getElementById('result-box');
    rb.innerHTML = msg;
    rb.style.display = 'block';
}
</script>
</body>
</html>
