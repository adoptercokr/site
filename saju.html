<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명리 사주 분석 - 인생의 지혜</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .section-title { 
            font-size: 20px; 
            color: var(--primary-dark); 
            background: #FFF0E8; 
            padding: 12px 18px; 
            border-radius: 12px; 
            margin: 30px 0 15px; 
            font-weight: bold; 
            display: inline-block;
        }
        .p-block { 
            font-size: 19px; 
            margin-bottom: 20px; 
            color: var(--text-main); 
            line-height: 1.8; 
            text-align: justify;
            background: #fff;
            padding: 10px;
        }
        #loading { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); 
            z-index: 2000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .search-anim { 
            width: 80px; height: 80px; 
            border: 6px solid #f3f3f3; 
            border-top: 6px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="top-nav">
        <a href="index.html" class="home-btn">🏠</a>
        <h2 style="font-size: 24px;">명리 사주 분석</h2>
        <div style="width:50px;"></div>
    </header>

    <div class="ad-box">📢 상단 메인 광고 배너</div>

    <main class="content-padding">
        <div id="loading">
            <div class="search-anim"></div>
            <p style="font-size:20px; font-weight:bold; color:var(--primary-dark);">운명의 지도를 분석 중입니다...</p>
        </div>

        <div id="input-view" class="card animate-in">
            <h3 style="font-size: 24px; color: var(--primary-dark); margin-bottom: 20px; text-align: center;">📜 심층 사주 리포트</h3>
            
            <label>성함</label>
            <input type="text" id="u-name" placeholder="성함을 입력하세요">
            
            <label>생년월일 (8자리)</label>
            <input type="number" id="u-birth" placeholder="예: 19550821">
            
            <label>성별</label>
            <select id="u-gender">
                <option value="1">남성(乾命)</option>
                <option value="2">여성(坤命)</option>
            </select>
            
            <label>태어난 시간</label>
            <select id="u-hour">
                <option value="0">모름</option>
                <option value="1">자시 (23:30~01:29)</option>
                <option value="2">축시 (01:30~03:29)</option>
                <option value="3">인시 (03:30~05:29)</option>
                <option value="4">묘시 (05:30~07:29)</option>
                <option value="5">진시 (07:30~09:29)</option>
                <option value="6">사시 (09:30~11:29)</option>
                <option value="7">오시 (11:30~13:29)</option>
                <option value="8">미시 (13:30~15:29)</option>
                <option value="9">신시 (15:30~17:29)</option>
                <option value="10">유시 (17:30~19:29)</option>
                <option value="11">술시 (19:30~21:29)</option>
                <option value="12">해시 (21:30~23:29)</option>
            </select>
            
            <button class="btn-main" onclick="run()">운명 분석 시작하기</button>
        </div>

        <div id="result-view" class="card animate-in" style="display:none;">
            <h2 id="res-header" style="text-align:center; color:var(--primary-dark); margin-bottom: 20px;"></h2>
            <div id="res-body"></div>
            <button class="btn-main" style="background:#636E72; margin-top:30px;" onclick="location.reload()">새로 분석하기</button>
        </div>
    </main>

    <div class="ad-fixed-bottom">
        <div class="ad-box" style="margin:0">📢 하단 고정 광고 배너</div>
    </div>
</div>

function run() {
    const name = document.getElementById('u-name').value;
    const birth = document.getElementById('u-birth').value;
    const hour = document.getElementById('u-hour').value;

    if (!name || birth.length !== 8) {
        alert("성함과 생년월일 8자리를 확인해 주세요.");
        return;
    }

    document.getElementById('loading').style.display = 'flex';
    
    setTimeout(() => {
        let nameScore = 0;
        for(let i=0; i<name.length; i++) nameScore += name.charCodeAt(i);
        const seed = parseInt(birth) + nameScore + (parseInt(hour) * 7);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('res-header').innerText = `📜 ${name}님의 심층 분석 리포트`;

        const getSection = (data, offset) => {
            if (!data || data.length === 0) return "데이터 준비 중...";
            let result = "";
            for(let k=0; k<3; k++) {
                let index = (seed + offset + (k * 31)) % data.length;
                result += data[index] + " ";
            }
            return `<div class="p-block">${result}</div>`;
        };

        let html = "";
        html += `<div class="section-title">🌟 총평: 운명의 흐름</div>` + getSection(DB.opening, 100);
        html += `<div class="section-title">✨ 성정: 타고난 기질</div>` + getSection(DB.nature, 200);
        html += `<div class="section-title">💰 재물: 금전의 기운</div>` + getSection(DB.wealth, 300);
        html += `<div class="section-title">📜 조언: 개운의 열쇠</div>` + getSection(DB.advice, 400);

        document.getElementById('res-body').innerHTML = html;
        window.scrollTo(0, 0);
    }, 3000);
}
