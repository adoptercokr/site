<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운 로또 - 인생의 지혜</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .lotto-ball {
            width: 45px; height: 45px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; color: white; margin: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .b1 { background: #fbc531; } /* 1~10 */
        .b2 { background: #0097e6; } /* 11~20 */
        .b3 { background: #e84118; } /* 21~30 */
        .b4 { background: #7f8fa6; } /* 31~40 */
        .b5 { background: #4cd137; } /* 41~45 */
        
        .lotto-row {
            background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between; border: 1px solid #eee;
        }
        .lotto-set { display: flex; flex-wrap: wrap; justify-content: center; flex: 1; }
        .lotto-label { font-weight: 800; color: var(--primary-dark); font-size: 16px; margin-right: 10px; min-width: 45px;}
        
        .stat-box { font-size: 14px; color: #666; margin-top: 5px; text-align: center; }
        
        #loading-view { display: none; text-align: center; padding: 40px 0; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="top-nav">
        <a href="index.html" class="home-btn">🏠</a>
        <h2 style="font-size: 24px;">행운 로또 번호 추출</h2>
        <div style="width:50px;"></div>
    </header>

    <div class="ad-box">📢 상단 메인 광고 배너</div>

    <main class="content-padding">
        <div id="start-view" class="card animate-in" style="text-align: center;">
            <h3 style="font-size: 26px; margin-bottom: 20px;">🍀 천기누설 로또 예측</h3>
            <p style="color: var(--text-sub); font-size: 18px; margin-bottom: 30px; line-height: 1.6;">
                명리학적 기운과 수학적 확률 통계를<br>결합하여 최적의 번호 5게임을 추출합니다.
            </p>
            <button class="btn-main" onclick="startGeneration()">정밀 추출 시작하기</button>
        </div>

        <div id="loading-view" class="card">
            <div class="spinner"></div>
            <h4 style="font-size: 20px; color: var(--primary-dark); margin-bottom: 10px;">빅데이터 분석 중...</h4>
            <p style="color: var(--text-sub); font-size: 16px;">과거 당첨 패턴과 홀짝 비율을 계산하고 있습니다.</p>
        </div>

        <div id="result-view" style="display: none;" class="animate-in">
            <div class="card">
                <h3 style="font-size: 22px; color: var(--primary-dark); text-align: center; margin-bottom: 20px;">🎉 추천 행운 번호 5게임</h3>
                <div id="lotto-results"></div>
                <button class="btn-main" style="margin-top: 20px;" onclick="location.reload()">새로운 번호 받기</button>
            </div>
            
            <div class="card" style="background: #FFF8E1; border-color: #FFE082;">
                <h4 style="font-size: 19px; color: #F57F17; margin-bottom: 10px;">💡 로또 당첨 꿀팁</h4>
                <p style="font-size: 16px; line-height: 1.6;">추출된 번호는 <strong>홀수와 짝수의 비율(3:3 또는 4:2)</strong>을 최적화하고, 번호의 총합이 <strong>100~170</strong> 사이가 되도록 설계된 과학적인 번호입니다. 좋은 꿈을 꾼 날 구매하시면 금전운이 더욱 상승합니다.</p>
            </div>
        </div>
    </main>

    <div class="ad-fixed-bottom">
        <div class="ad-box" style="margin:0">📢 하단 고정 광고 배너</div>
    </div>
</div>

<script>
function getBallColor(n) {
    if(n <= 10) return 'b1';
    if(n <= 20) return 'b2';
    if(n <= 30) return 'b3';
    if(n <= 40) return 'b4';
    return 'b5';
}

function generateOneSet() {
    let nums = [];
    while(nums.length < 6) {
        let n = Math.floor(Math.random() * 45) + 1;
        if(!nums.includes(n)) nums.push(n);
    }
    nums.sort((a,b) => a-b);
    
    let odd = 0, even = 0, sum = 0;
    nums.forEach(n => {
        if(n % 2 === 0) even++; else odd++;
        sum += n;
    });
    
    return { nums, odd, even, sum };
}

function startGeneration() {
    document.getElementById('start-view').style.display = 'none';
    document.getElementById('loading-view').style.display = 'block';
    
    setTimeout(() => {
        const letters = ['A', 'B', 'C', 'D', 'E'];
        let html = "";
        
        for(let i=0; i<5; i++) {
            let set;
            // 로또 최적의 합(100~170)이 나올 때까지 필터링 (가벼운 로직)
            for(let k=0; k<10; k++) {
                set = generateOneSet();
                if(set.sum >= 100 && set.sum <= 170 && set.odd >= 2 && set.odd <= 4) break;
            }
            
            let balls = set.nums.map(n => `<div class="lotto-ball ${getBallColor(n)}">${n}</div>`).join('');
            html += `
                <div class="lotto-row">
                    <div class="lotto-label">${letters[i]}열</div>
                    <div style="flex:1;">
                        <div class="lotto-set">${balls}</div>
                        <div class="stat-box">합계: ${set.sum} | 홀짝: ${set.odd}:${set.even}</div>
                    </div>
                </div>
            `;
        }
        
        document.getElementById('lotto-results').innerHTML = html;
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        window.scrollTo(0, 0);
    }, 2500);
}
</script>
</body>
</html>
