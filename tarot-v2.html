<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운명의 타로 - 인생의 지혜</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .tarot-deck {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px;
        }
        .tarot-card {
            width: 48px; height: 75px; background: linear-gradient(135deg, #2c3e50, #34495e); 
            border: 2px solid #f1c40f; border-radius: 6px; cursor: pointer; transition: 0.3s;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 4px);
        }
        .tarot-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(241,196,15,0.4); }
        .tarot-card.picked { opacity: 0; pointer-events: none; }
        
        .slots { display: flex; justify-content: space-around; margin: 30px 0; }
        .slot {
            width: 80px; height: 120px; border: 2px dashed #ccc; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 14px; color: #999;
        }
        .slot.filled {
            border: 2px solid var(--primary); background: #fff; color: var(--primary-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-weight: bold; font-size: 40px;
        }
        .slot-title { font-size: 14px; color: #666; margin-top: 10px; font-weight: bold; }
        
        #result-view { display: none; }
        .res-box { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--primary); text-align: left;}
        .res-title { font-size: 20px; color: var(--primary-dark); margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        .res-desc { font-size: 17px; line-height: 1.6; color: #444; }
        
        #loading-view { display: none; text-align: center; padding: 40px 0; }
        .spinner { font-size: 50px; animation: spin 2s linear infinite; display: inline-block;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="top-nav">
        <a href="index.html" class="home-btn">🏠</a>
        <h2 style="font-size: 24px;">운명의 타로</h2>
        <div style="width:50px;"></div>
    </header>

    <div class="ad-box">📢 상단 메인 광고 배너</div>

    <main class="content-padding">
        <div id="select-view" class="card animate-in" style="text-align: center;">
            <h3 style="font-size: 22px; color: var(--primary-dark); margin-bottom: 15px;">🔮 카드를 3장 선택해 주세요</h3>
            <p style="color: var(--text-sub); font-size: 16px; margin-bottom: 20px;">과거, 현재, 미래를 순서대로 알아봅니다.</p>
            
            <div class="slots">
                <div><div class="slot" id="slot-0">1</div><div class="slot-title">과거</div></div>
                <div><div class="slot" id="slot-1">2</div><div class="slot-title">현재</div></div>
                <div><div class="slot" id="slot-2">3</div><div class="slot-title">미래</div></div>
            </div>
            
            <div class="tarot-deck" id="deck"></div>
        </div>

        <div id="loading-view" class="card">
            <div class="spinner">🔮</div>
            <h4 style="font-size: 20px; color: var(--primary-dark); margin-top: 15px;">우주의 기운을 읽는 중...</h4>
        </div>

        <div id="result-view" class="card animate-in">
            <h3 style="font-size: 24px; color: var(--primary-dark); text-align: center; margin-bottom: 20px;">📜 타로 리딩 결과</h3>
            <div id="res-content"></div>
            <button class="btn-main" style="margin-top: 20px;" onclick="location.reload()">다시 뽑기</button>
        </div>
    </main>

    <div class="ad-fixed-bottom">
        <div class="ad-box" style="margin:0">📢 하단 고정 광고 배너</div>
    </div>
</div>

<script>
const arcana = [
    { e: "🃏", n: "광대 (The Fool)", d: "새로운 시작과 무한한 가능성을 의미합니다. 두려움 없이 첫걸음을 내딛으세요." },
    { e: "🧙‍♂️", n: "마법사 (The Magician)", d: "당신에게는 이미 성공할 수 있는 능력과 도구가 갖춰져 있습니다. 자신감을 가지세요." },
    { e: "👩‍🏫", n: "여사제 (The High Priestess)", d: "내면의 직관과 통찰력이 뛰어난 시기입니다. 당신의 육감을 믿고 조용히 관찰하세요." },
    { e: "👸", n: "여황제 (The Empress)", d: "풍요와 사랑이 넘칩니다. 물질적, 정신적으로 안정되며 풍성한 결실을 맺게 됩니다." },
    { e: "🤴", n: "황제 (The Emperor)", d: "강력한 리더십과 체계적인 질서가 필요한 때입니다. 권위와 안정을 얻게 됩니다." },
    { e: "🕍", n: "교황 (The Hierophant)", d: "전통과 규칙을 따르는 것이 이롭습니다. 훌륭한 멘토나 귀인의 도움을 받을 수 있습니다." },
    { e: "💑", n: "연인 (The Lovers)", d: "아름다운 인연이나 중요한 선택의 갈림길에 있습니다. 마음이 끌리는 쪽을 택하세요." },
    { e: "🐎", n: "전차 (The Chariot)", d: "강력한 추진력으로 장애물을 돌파할 때입니다. 주저하지 말고 앞으로 나아가세요." },
    { e: "🦁", n: "힘 (Strength)", d: "부드러움이 강함을 이깁니다. 인내심과 따뜻한 포용력으로 상황을 통제할 수 있습니다." },
    { e: "🏮", n: "은둔자 (The Hermit)", d: "외부의 소음에서 벗어나 스스로를 돌아볼 시간입니다. 해답은 당신 내면에 있습니다." },
    { e: "🎡", n: "운명의 수레바퀴 (Wheel of Fortune)", d: "운명의 큰 전환점이 찾아왔습니다. 변화의 흐름에 순응하면 더 높은 곳으로 올라갑니다." },
    { e: "⚖️", n: "정의 (Justice)", d: "공정하고 객관적인 판단이 필요합니다. 뿌린 대로 거두게 되는 인과응보의 시기입니다." },
    { e: "🤸", n: "매달린 사람 (The Hanged Man)", d: "잠시 멈춰 서서 관점을 완전히 바꿔야 할 때입니다. 헌신과 기다림이 필요합니다." },
    { e: "💀", n: "죽음 (Death)", d: "하나의 챕터가 끝나고 완전히 새로운 시작이 열립니다. 과거에 대한 집착을 버리세요." },
    { e: "🏺", n: "절제 (Temperance)", d: "양극단에 치우치지 않는 균형과 조화가 필요합니다. 타협을 통해 최선을 찾으세요." },
    { e: "👿", n: "악마 (The Devil)", d: "유혹이나 물질적 집착에 빠지기 쉬운 때입니다. 스스로를 얽매고 있는 사슬을 끊어내세요." },
    { e: "⚡", n: "탑 (The Tower)", d: "예상치 못한 급격한 변화가 일어납니다. 낡은 껍질을 깨부수어야 새 건물을 지을 수 있습니다." },
    { e: "⭐", n: "별 (The Star)", d: "어두운 밤하늘의 희망입니다. 당신의 꿈과 목표가 이루어질 수 있는 긍정적인 기운이 가득합니다." },
    { e: "🌕", n: "달 (The Moon)", d: "불안과 환상이 혼재되어 있습니다. 숨겨진 진실을 파악할 때까지 성급한 결정은 미루세요." },
    { e: "☀️", n: "태양 (The Sun)", d: "최고의 행운과 긍정적인 에너지를 의미합니다. 모든 일이 순조롭고 명예와 기쁨을 얻습니다." },
    { e: "🎺", n: "심판 (Judgement)", d: "과거의 노력에 대한 보상을 받는 부활의 시기입니다. 긍정적인 소식을 듣게 됩니다." },
    { e: "🌍", n: "세계 (The World)", d: "완벽한 완성 해피엔딩을 의미합니다. 목표를 달성하고 새로운 차원으로 도약하게 됩니다." }
];

let picked = [];

function initDeck() {
    const deck = document.getElementById('deck');
    for(let i=0; i<22; i++) {
        let card = document.createElement('div');
        card.className = 'tarot-card';
        card.onclick = () => pickCard(card, i);
        deck.appendChild(card);
    }
}

function pickCard(cardEl, idx) {
    if(picked.length >= 3) return;
    
    // Pick random arcana
    let rIdx;
    do { rIdx = Math.floor(Math.random() * arcana.length); } 
    while (picked.find(p => p.idx === rIdx));
    
    picked.push({ idx: rIdx, data: arcana[rIdx] });
    cardEl.classList.add('picked');
    
    const slot = document.getElementById('slot-' + (picked.length - 1));
    slot.classList.add('filled');
    slot.innerText = arcana[rIdx].e;
    
    if(picked.length === 3) {
        setTimeout(showResult, 800);
    }
}

function showResult() {
    document.getElementById('select-view').style.display = 'none';
    document.getElementById('loading-view').style.display = 'block';
    
    setTimeout(() => {
        let html = "";
        const labels = ["과거의 영향", "현재의 상황", "미래의 조언"];
        
        for(let i=0; i<3; i++) {
            html += `
            <div class="res-box">
                <div class="res-title">${labels[i]}: ${picked[i].data.e} ${picked[i].data.n}</div>
                <div class="res-desc">${picked[i].data.d}</div>
            </div>`;
        }
        
        document.getElementById('res-content').innerHTML = html;
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
    }, 2500);
}

window.onload = initDeck;
</script>
</body>
</html>
